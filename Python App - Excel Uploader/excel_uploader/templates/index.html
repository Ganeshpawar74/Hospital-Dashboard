<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Connect to MySQL</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <h2 class="mb-4">Connect to MySQL Database</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('connect') }}" method="POST">
      <div class="mb-3">
        <label for="host" class="form-label">Host</label>
        <input type="text" class="form-control" name="host" required value="localhost">
      </div>
      <div class="mb-3">
        <label for="user" class="form-label">User</label>
        <input type="text" class="form-control" name="user" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" name="password" required>
      </div>
      <div class="mb-3">
        <label for="database" class="form-label">Database</label>
        <input type="text" class="form-control" name="database" required>
      </div>
      <button type="submit" class="btn btn-primary">Connect</button>
    </form>
  </div>
</body>
</html>
