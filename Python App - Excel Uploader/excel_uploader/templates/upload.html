<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Excel or CSV Files</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <h2 class="mb-4">Upload Excel or CSV File</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('process') }}" method="POST" enctype="multipart/form-data">
      <div class="mb-3">
        <label for="files" class="form-label">Select Excel or CSV Files</label>
        <input type="file" class="form-control" name="files" multiple required>
      </div>
      <button type="submit" class="btn btn-success">Upload</button>
    </form>
  </div>
</body>
</html>
